# ============================================================================
# Observability Stack — kube-prometheus-stack + DCGM Exporter
# ============================================================================
# Deploy:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo add nvidia https://nvidia.github.io/dcgm-exporter
#   helm repo update
#
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values helm/observability-values.yaml
#
#   helm upgrade --install dcgm-exporter nvidia/dcgm-exporter \
#     --namespace monitoring --create-namespace \
#     --set serviceMonitor.enabled=true
# ============================================================================

kube-prometheus-stack:
  namespace: monitoring
  fullnameOverride: kube-prometheus-stack

  prometheus:
    prometheusSpec:
      retention: 7d
      retentionSize: 20GB
      scrapeInterval: 30s
      evaluationInterval: 30s

      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector: {}

      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: 2
          memory: 4Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

      additionalScrapeConfigs:
        - job_name: vllm-metrics
          scrape_interval: 15s
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: [vllm]
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)

        - job_name: dcgm-exporter
          scrape_interval: 15s
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names: [monitoring]
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              action: keep
              regex: dcgm-exporter

  grafana:
    enabled: true
    adminPassword: "admin"
    persistence:
      enabled: true
      size: 10Gi
    service:
      type: ClusterIP
      port: 3000

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        vllm-dashboard:
          gnetId: null
          datasource: Prometheus
          json: |
            {{ .Files.Get "dashboards/vllm-dashboard.json" | nindent 12 }}

  alertmanager:
    enabled: false

  kube-state-metrics:
    enabled: true

  node-exporter:
    enabled: true
