# ============================================================================
# vLLM Ingress — AWS Application Load Balancer
# ============================================================================
# Routes:
#   /v1/completions  → vLLM OpenAI-compatible completions endpoint
#   /v1/chat/completions → vLLM chat completions
#   /health           → vLLM health check
#   /metrics          → Prometheus metrics
# ============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-ingress
  namespace: vllm
  labels:
    app: vllm
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "8000"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "5"
    alb.ingress.kubernetes.io/tags: "Environment=production,Project=mal-vllm-inference"
    alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=120,routing.http.drop_invalid_header_fields.enabled=true"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /v1/completions
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 8000
          - path: /v1/chat/completions
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: vllm
                port:
                  number: 8000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: vllm
                port:
                  number: 8000
