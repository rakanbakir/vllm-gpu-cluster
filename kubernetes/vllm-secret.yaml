# ============================================================================
# Kubernetes Secret — vLLM HuggingFace Token
# ============================================================================
# IMPORTANT: Do NOT commit the actual token here.
# In production, use AWS Secrets Manager + External Secrets Operator:
#
#   kubectl create secret generic vllm-secrets \
#     --from-literal=hf_token=$HF_TOKEN \
#     -n vllm
#
# Or with External Secrets Operator:
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   metadata:
#     name: vllm-secrets
#     namespace: vllm
#   spec:
#     refreshInterval: 1h
#     secretStoreRef:
#       name: aws-secrets-manager
#       kind: ClusterSecretStore
#     target:
#       name: vllm-secrets
#     data:
#       - secretKey: hf_token
#         remoteRef:
#           key: mal-vllm-huggingface-token
#           property: HF_TOKEN
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: vllm-secrets
  namespace: vllm
  labels:
    app: vllm
type: Opaque
stringData:
  hf_token: "REPLACE_ME_WITH_YOUR_HUGGINGFACE_TOKEN"
